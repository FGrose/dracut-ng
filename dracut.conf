# PUT YOUR CONFIG IN separate files
# in /etc/dracut.conf.d named "<name>.conf"
# SEE man dracut.conf(5) for options
mdadmconf=no
lvmconf=no
compress=zstd
add_dracutmodules+=" dmsquash-live bash "
omit_dracutmodules+=" fips fips-crypto-policies dmsquash-live-autooverlay dmsquash-live-ntfs network \
network-manager livenet qemu-net lvm dmraid mdraid systemd systemd-cryptsetup cifs iscsi nfs nvmf \
systemd-ask-password systemd-battery-check systemd-pcrextend systemd-pcrphase systemd-initrd systemd-sysusers dracut-systemd memstrack multipath plymouth "
hostonly=no
hostonly_cmdline=no
early_microcode=yes
dracut_rescue_image=no
